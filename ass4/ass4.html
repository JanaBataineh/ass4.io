<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card - الواجب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card">
        <div class="card-header">
            <img src="https://via.placeholder.com/100" alt="Profile Image" class="profile-img">
            <h2>Ricky Park</h2>
            <p class="title">Graphic Designer</p>
        </div>
        
        <div class="card-body">
            <p>I am a graphic designer with a passion for creating clean and elegant designs.</p>
        </div>

        <div class="card-footer">
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <button class="contact-btn">Contact Me</button>
        </div>
    </div>

</body>
</html>
